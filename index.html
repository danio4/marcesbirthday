<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦄 Feliz Cumpleaños Marce!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, #2d0a5e 0%, #1a0a3e 50%, #0a0a2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      overflow: hidden;
      position: relative;
    }

    /* ─── Stars ─── */
    #stars {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d, 2s) ease-in-out infinite;
      animation-delay: var(--dl, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50%       { opacity: 1;    transform: scale(1.4); }
    }

    /* ─── Background floating emoji ─── */
    #sparkle-bg {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .sp-bg {
      position: absolute;
      animation: sp-float var(--d, 6s) ease-in-out infinite;
      animation-delay: var(--dl, 0s);
      opacity: 0.25;
    }
    @keyframes sp-float {
      0%, 100% { transform: translateY(0) rotate(0deg);   opacity: 0.2; }
      50%       { transform: translateY(-28px) rotate(180deg); opacity: 0.5; }
    }

    /* ─── Confetti ─── */
    #confetti {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 200;
      overflow: hidden;
    }
    .cp {
      position: absolute;
      top: -12px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(0)      rotate(0deg)   translateX(0);           opacity: 1;   }
      100% { transform: translateY(110vh)  rotate(720deg) translateX(var(--drift)); opacity: 0.2; }
    }

    /* ─── Envelope scene ─── */
    #env-scene {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 1.8rem;
      cursor: pointer;
      animation: float-env 3s ease-in-out infinite;
      transition: opacity 0.5s, transform 0.5s;
    }
    #env-scene.gone {
      opacity: 0; transform: scale(0.4) translateY(60px);
      pointer-events: none;
    }
    @keyframes float-env {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-18px); }
    }

    .env-wrap { position: relative; width: 300px; height: 210px; }

    /* body */
    .env-body {
      position: absolute; inset: 0;
      background: linear-gradient(145deg, #f9e1ff, #e8c8f8);
      border-radius: 8px;
      border: 3px solid #d9a8f0;
      box-shadow:
        0 12px 40px rgba(200,80,255,.45),
        0  0  80px rgba(160,60,255,.2);
      overflow: hidden;
    }

    /* bottom-left / bottom-right triangles */
    .env-bl {
      position: absolute; bottom: 0; left: 0;
      width: 0; height: 0;
      border-left: 150px solid #d0a0e4;
      border-top:  115px solid transparent;
    }
    .env-br {
      position: absolute; bottom: 0; right: 0;
      width: 0; height: 0;
      border-right: 150px solid #d0a0e4;
      border-top:   115px solid transparent;
    }

    /* flap — sits on top */
    .env-flap {
      position: absolute; top: 0; left: 0; z-index: 3;
      width: 0; height: 0;
      border-left:  150px solid transparent;
      border-right: 150px solid transparent;
      border-top:   115px solid #e0b8f4;
      transform-origin: 50% 0%;
      transition: transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 3px 6px rgba(0,0,0,.12));
    }
    .env-flap.open { transform: rotateX(180deg); }

    /* seal */
    .env-seal {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      width: 62px; height: 62px;
      background: radial-gradient(circle at 35% 35%, #ff8fe4, #c040b8);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      box-shadow: 0 0 22px rgba(255,100,200,.7);
      animation: seal-pulse 1.8s ease-in-out infinite;
    }
    @keyframes seal-pulse {
      0%, 100% { box-shadow: 0 0 22px rgba(255,100,200,.6); }
      50%       { box-shadow: 0 0 44px rgba(255,100,200,.9), 0 0 70px rgba(200,60,200,.35); }
    }

    .env-hint {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.2rem;
      color: #eac8ff;
      text-shadow: 0 0 18px rgba(200,100,255,.9);
      animation: hint-blink 2s ease-in-out infinite;
    }
    @keyframes hint-blink {
      0%, 100% { opacity: .65; }
      50%       { opacity: 1; }
    }

    /* ─── Card scene ─── */
    #card-scene {
      display: none;
      position: relative; z-index: 10;
      flex-direction: column; align-items: center;
      width: min(96vw, 560px);
      opacity: 0; transform: scale(0.8) translateY(30px);
      transition: opacity 0.7s cubic-bezier(.34,1.56,.64,1),
                  transform 0.7s cubic-bezier(.34,1.56,.64,1);
    }
    #card-scene.visible { opacity: 1; transform: scale(1) translateY(0); }

    .card {
      background: linear-gradient(145deg, #fff0fe, #eedeff, #fff0fe);
      border-radius: 22px;
      padding: 2.2rem 2rem;
      text-align: center;
      border: 3px solid #e0b0f8;
      box-shadow:
        0 20px 60px rgba(180,60,255,.3),
        0  0  120px rgba(180,60,255,.12);
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    /* shimmer overlay */
    .card::before {
      content: '';
      position: absolute; inset: -50%;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(255,200,255,.08) 60deg, transparent 120deg);
      animation: shimmer 10s linear infinite;
      pointer-events: none;
    }
    @keyframes shimmer { to { transform: rotate(360deg); } }

    .rainbow-bar {
      height: 8px; border-radius: 4px;
      background: linear-gradient(90deg,#f00,#f70,#ff0,#0f0,#00f,#8b00ff,#f00);
      background-size: 300%;
      animation: rb-move 3s linear infinite;
      margin-bottom: 1.4rem;
    }
    @keyframes rb-move { to { background-position: 300%; } }

    .pony-row {
      display: flex; justify-content: center;
      gap: .8rem; margin: .8rem 0;
      flex-wrap: wrap;
    }
    .pony {
      font-size: 2.6rem; display: inline-block;
      animation: pony-bounce 1.1s ease-in-out infinite;
    }
    .pony:nth-child(2) { animation-delay: .18s; }
    .pony:nth-child(3) { animation-delay: .36s; }
    .pony:nth-child(4) { animation-delay: .54s; }
    .pony:nth-child(5) { animation-delay: .72s; }
    @keyframes pony-bounce {
      0%, 100% { transform: translateY(0)   rotate(-4deg); }
      50%       { transform: translateY(-14px) rotate(4deg); }
    }

    .birthday-text {
      font-size: clamp(1.8rem, 5.5vw, 3rem);
      background: linear-gradient(130deg, #c040b8, #7b2fbe, #ff6eb4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2; margin: .4rem 0;
      position: relative; z-index: 1;
    }

    .name-text {
      font-size: clamp(2.8rem, 9vw, 5rem);
      background: linear-gradient(130deg, #ff6eb4, #c040b8, #7b2fbe, #ff6eb4);
      background-size: 300%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: name-move 3s linear infinite;
      position: relative; z-index: 1;
      line-height: 1.1;
    }
    @keyframes name-move { to { background-position: 300%; } }

    .cutie-row {
      display: flex; justify-content: center;
      gap: 2rem; flex-wrap: wrap;
      margin: 1.1rem 0;
    }
    .cutie {
      display: flex; flex-direction: column; align-items: center; gap: .3rem;
    }
    .cutie svg { animation: spin-cm 5s linear infinite; }
    .cutie:nth-child(2) svg { animation-direction: reverse; animation-duration: 7s; }
    .cutie:nth-child(3) svg { animation-duration: 6s; }
    @keyframes spin-cm { to { transform: rotate(360deg); } }
    .cutie-name {
      font-family: 'Nunito', sans-serif;
      font-size: .72rem; font-weight: 900;
      color: #c040b8; letter-spacing: .5px;
    }

    .msg {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(.9rem, 2.4vw, 1.05rem);
      font-weight: 700;
      color: #5e1a82;
      line-height: 1.7;
      margin: 1rem 0;
      position: relative; z-index: 1;
    }

    .sp-row {
      font-size: 1.4rem;
      letter-spacing: .3rem;
      margin: .4rem 0;
    }

    /* ─── Replay button ─── */
    #replay-btn {
      display: none;
      margin-top: 1rem;
      padding: .7rem 2rem;
      background: linear-gradient(135deg, #c040b8, #7b2fbe);
      color: white;
      border: none; border-radius: 50px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(180,60,255,.4);
      transition: transform .2s, box-shadow .2s;
      position: relative; z-index: 1;
    }
    #replay-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 10px 30px rgba(180,60,255,.55);
    }
  </style>
</head>
<body>

<div id="stars"></div>
<div id="sparkle-bg"></div>
<div id="confetti"></div>

<!-- ── Envelope ── -->
<div id="env-scene" onclick="openEnvelope()">
  <div class="env-wrap">
    <div class="env-body">
      <div class="env-bl"></div>
      <div class="env-br"></div>
      <div class="env-seal">🦄</div>
    </div>
    <div class="env-flap" id="env-flap"></div>
  </div>
  <p class="env-hint">✨ Haz clic para abrir ✨</p>
</div>

<!-- ── Birthday card ── -->
<div id="card-scene">
  <div class="card">
    <div class="rainbow-bar"></div>

    <div class="pony-row">
      <span class="pony">🦄</span>
      <span class="pony">🌈</span>
      <span class="pony">⭐</span>
      <span class="pony">🌈</span>
      <span class="pony">🦄</span>
    </div>

    <div class="birthday-text">✨ Feliz Cumpleaños ✨</div>
    <div class="name-text">Marce!</div>

    <div class="sp-row">💜 🌟 💜 🌟 💜</div>

    <!-- Cutie marks SVG -->
    <div class="cutie-row">
      <!-- Twilight Sparkle — 6-point star -->
      <div class="cutie">
        <svg width="48" height="48" viewBox="0 0 48 48">
          <polygon points="24,4 27.5,19 43,19 30,28.5 34.5,44 24,34 13.5,44 18,28.5 5,19 20.5,19"
                   fill="#7B2FBE" stroke="#5a1a9e" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="cutie-name">Twilight</span>
      </div>
      <!-- Rainbow Dash — lightning bolt -->
      <div class="cutie">
        <svg width="48" height="48" viewBox="0 0 48 48">
          <polygon points="30,4 14,26 24,26 18,46 38,22 27,22"
                   fill="#FFD700" stroke="#FFA500" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="cutie-name">Rainbow</span>
      </div>
      <!-- Pinkie Pie — balloon -->
      <div class="cutie">
        <svg width="48" height="48" viewBox="0 0 48 48">
          <ellipse cx="24" cy="19" rx="13" ry="15" fill="#FF9BD2" stroke="#ff6eb4" stroke-width="2"/>
          <line x1="24" y1="34" x2="24" y2="46" stroke="#FF9BD2" stroke-width="2"/>
          <path d="M24,46 Q20,44 22,42" fill="none" stroke="#FF9BD2" stroke-width="1.5"/>
        </svg>
        <span class="cutie-name">Pinkie</span>
      </div>
    </div>

    <div class="msg">
      🎂 Que este día esté lleno de magia,<br>
      arcoíris y toda la amistad de Equestria 🎂<br><br>
      💜 Eres tan especial como<br>
      la Magia de la Amistad misma 💜<br><br>
      🌟 ¡Que todos tus deseos se hagan realidad! 🌟
    </div>

    <div class="rainbow-bar"></div>

    <div class="pony-row">
      <span class="pony">🎉</span>
      <span class="pony">🎊</span>
      <span class="pony">🎂</span>
      <span class="pony">🎊</span>
      <span class="pony">🎉</span>
    </div>

    <button id="replay-btn" onclick="replayCelebration()">🎊 ¡Otra vez!</button>
  </div>
</div>

<script>
  // ── Stars ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.8 + .8;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(2)}s;--dl:${(Math.random()*3).toFixed(2)}s`;
    starsEl.appendChild(s);
  }

  // ── Background sparkles ──
  const spBg = document.getElementById('sparkle-bg');
  const spItems = ['✨','⭐','💫','🌟','💜','🦄','🌈'];
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'sp-bg';
    d.textContent = spItems[i % spItems.length];
    d.style.cssText = `font-size:${Math.random()*1.2+1}rem;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+4).toFixed(2)}s;--dl:${(Math.random()*4).toFixed(2)}s`;
    spBg.appendChild(d);
  }

  // ── Open envelope ──
  function openEnvelope() {
    const flap = document.getElementById('env-flap');
    const envScene = document.getElementById('env-scene');
    const cardScene = document.getElementById('card-scene');

    flap.classList.add('open');

    setTimeout(() => {
      envScene.classList.add('gone');
      cardScene.style.display = 'flex';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        cardScene.classList.add('visible');
        launchConfetti();
        setTimeout(() => {
          document.getElementById('replay-btn').style.display = 'inline-block';
        }, 1200);
      }));
    }, 700);
  }

  // ── Confetti ──
  function launchConfetti() {
    const container = document.getElementById('confetti');
    const colors = ['#ff6eb4','#c840b8','#7b2fbe','#FFD700','#65C8E5','#FF9BD2','#ff8c42','#ffffff','#a8ff78'];

    for (let i = 0; i < 130; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'cp';
        const sz = Math.random() * 10 + 6;
        const shapes = ['2px','50%','0'];
        p.style.cssText = `
          left:${Math.random()*100}%;
          width:${sz}px; height:${sz * (Math.random()*.6+.7)}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          border-radius:${shapes[Math.floor(Math.random()*shapes.length)]};
          --drift:${(Math.random()-0.5)*220}px;
          animation-duration:${(Math.random()*2+2).toFixed(2)}s;
          animation-delay:${(Math.random()*.4).toFixed(2)}s;
        `;
        container.appendChild(p);
        setTimeout(() => p.remove(), 4500);
      }, i * 18);
    }
  }

  // ── Replay ──
  function replayCelebration() { launchConfetti(); }
</script>
</body>
</html>
